namespace: shopmicro-helm

ingress:
  enabled: true
  className: nginx
  host: shopmicro-helm.local

frontend:
  replicas: 2
  image:
    repository: nginx
    tag: "1.25"
    pullPolicy: IfNotPresent

apiGateway:
  replicas: 2
  image:
    repository: nginx
    tag: "1.25"
    pullPolicy: IfNotPresent

productService:
  replicas: 2
  image:
    repository: 192.168.100.10:5000/blanes-product-service
    tag: "1.0"
    pullPolicy: Always
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

orderService:
  replicas: 3
  image:
    repository: 192.168.100.10:5000/blanes-order-service
    tag: "1.0"
    pullPolicy: Always
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

userService:
  replicas: 3
  image:
    repository: 192.168.100.10:5000/blanes-user-service
    tag: "1.0"
    pullPolicy: Always
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

cache:
  replicas: 1
  image:
    repository: redis
    tag: "7"
    pullPolicy: IfNotPresent

messageQueue:
  replicas: 1
  image:
    repository: rabbitmq
    tag: "3.11-management"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "150m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
      enabled: true
      size: "2Gi"

dbProducts:
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  auth:
    rootPassword: root_password
    database: productsdb
  persistence:
    size: 2Gi

dbOrders:
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  auth:
    rootPassword: root_password
    database: ordersdb
  persistence:
    size: 2Gi

hpa:
  minReplicas: 2
  maxReplicas: 8
  averageUtilization: 50
