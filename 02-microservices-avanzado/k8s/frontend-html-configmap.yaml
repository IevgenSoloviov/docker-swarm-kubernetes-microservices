apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: shopmicro
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="ca">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>ShopMicro · Blanes</title>

      <style>
        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          font-family: Arial, sans-serif;
          background: #eef2f7;
          color: #1f2937;
        }

        .container {
          max-width: 1100px;
          margin: 40px auto;
          padding: 20px;
        }

        .hero {
          background: linear-gradient(135deg, #0f172a, #2563eb);
          color: white;
          padding: 35px;
          border-radius: 18px;
          margin-bottom: 25px;
          box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .badge {
          display: inline-block;
          background: rgba(255,255,255,0.18);
          padding: 6px 12px;
          border-radius: 20px;
          font-size: 14px;
          margin-bottom: 10px;
        }

        h1, h2 {
          margin-top: 0;
        }

        .grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 20px;
          margin-bottom: 20px;
        }

        .card {
          background: white;
          padding: 25px;
          border-radius: 16px;
          box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        form {
          display: grid;
          gap: 12px;
        }

        input {
          padding: 12px;
          border: 1px solid #cbd5e1;
          border-radius: 10px;
          font-size: 15px;
        }

        button {
          padding: 12px 16px;
          border: none;
          border-radius: 10px;
          background: #2563eb;
          color: white;
          font-weight: bold;
          cursor: pointer;
        }

        button:hover {
          background: #1d4ed8;
        }

        .danger {
          background: #dc2626;
        }

        .danger:hover {
          background: #b91c1c;
        }

        .links {
          display: flex;
          gap: 10px;
          flex-wrap: wrap;
          margin-bottom: 20px;
        }

        .links button {
          background: #0f172a;
        }

        .missatge {
          margin-top: 12px;
          font-weight: bold;
        }

        .ok {
          color: #15803d;
        }

        .error {
          color: #dc2626;
        }

        .resultats {
          margin-top: 20px;
        }

        .llista {
          display: grid;
          gap: 15px;
        }

        .item {
          border-left: 5px solid #2563eb;
          background: #f8fafc;
          padding: 15px;
          border-radius: 10px;
        }

        .item strong {
          display: block;
          margin-bottom: 6px;
        }

        .item span {
          display: block;
          color: #475569;
          margin-top: 5px;
        }

        .item-actions {
          margin-top: 12px;
        }

        @media (max-width: 800px) {
          .grid {
            grid-template-columns: 1fr;
          }
        }
      </style>
    </head>

    <body>
      <main class="container">
        <section class="hero">
          <span class="badge">ShopMicro · Blanes</span>
          <h1>Gestió d’Incidències Urbanes</h1>
          <p>Portal ciutadà per registrar, consultar i gestionar incidències municipals.</p>
        </section>

        <section class="grid">
          <div class="card">
            <h2>Nova incidència</h2>

            <form id="form">
              <input id="tipus" type="text" placeholder="Tipus" required>
              <input id="descripcio" type="text" placeholder="Descripció" required>
              <input id="ubicacio" type="text" placeholder="Ubicació" required>
              <button type="submit">Crear incidència</button>
            </form>

            <p id="missatge" class="missatge"></p>
          </div>

          <div class="card">
            <h2>Consultes del sistema</h2>
            <p>Les dades es consulten a través de l’API Gateway.</p>

            <div class="links">
              <button onclick="carregarIncidencies()">Incidències</button>
              <button onclick="carregarTasques()">Tasques</button>
              <button onclick="carregarUsuaris()">Usuaris</button>
            </div>
          </div>
        </section>

        <section class="card resultats">
          <h2 id="titolResultats">Incidències registrades</h2>
          <div id="output" class="llista">Encara no s’han carregat dades.</div>
        </section>
      </main>

      <script>
        const API_INCIDENCIES = "/api/incidencies/";
        const API_TASQUES = "/api/tasques/";
        const API_USUARIS = "/api/usuaris/";

        document.getElementById("form").onsubmit = async (e) => {
          e.preventDefault();

          const incidencia = {
            tipus: document.getElementById("tipus").value,
            descripcio: document.getElementById("descripcio").value,
            ubicacio: document.getElementById("ubicacio").value
          };

          const res = await fetch(API_INCIDENCIES, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(incidencia)
          });

          const msg = document.getElementById("missatge");

          if (res.ok) {
            msg.textContent = "Incidència creada correctament.";
            msg.className = "missatge ok";
            e.target.reset();
            carregarIncidencies();
          } else {
            msg.textContent = "Error en crear la incidència.";
            msg.className = "missatge error";
          }
        };

        async function carregarIncidencies() {
          const res = await fetch(API_INCIDENCIES);
          const data = await res.json();

          document.getElementById("titolResultats").textContent = "Incidències registrades";

          document.getElementById("output").innerHTML = data.map(i => `
            <article class="item">
              <strong>#${i.id} · ${i.tipus}</strong>
              <p>${i.descripcio}</p>
              <span>${i.ubicacio} · Estat: ${i.estat}</span>
              <div class="item-actions">
                <button class="danger" onclick="eliminarIncidencia(${i.id})">Eliminar</button>
              </div>
            </article>
          `).join("");
        }

        async function eliminarIncidencia(id) {
          const confirmar = confirm("Vols eliminar aquesta incidència?");
          if (!confirmar) return;

          const res = await fetch(`${API_INCIDENCIES}${id}`, {
            method: "DELETE"
          });

          if (res.ok) {
            carregarIncidencies();
          } else {
            alert("No s’ha pogut eliminar la incidència.");
          }
        }

        async function carregarTasques() {
          const res = await fetch(API_TASQUES);
          const data = await res.json();

          document.getElementById("titolResultats").textContent = "Tasques";

          document.getElementById("output").innerHTML = data.map(t => `
            <article class="item">
              <strong>Tasca #${t.id}</strong>
              <p>Incidència associada: ${t.incidencia_id}</p>
              <span>${t.tecnic} · ${t.estat}</span>
            </article>
          `).join("");
        }

        async function carregarUsuaris() {
          const res = await fetch(API_USUARIS);
          const data = await res.json();

          document.getElementById("titolResultats").textContent = "Usuaris";

          document.getElementById("output").innerHTML = data.map(u => `
            <article class="item">
              <strong>${u.nom}</strong>
              <p>Identificador: ${u.id}</p>
              <span>Rol: ${u.rol}</span>
            </article>
          `).join("");
        }

        carregarIncidencies();
      </script>
    </body>
    </html>
